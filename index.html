<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>正在前往表單...</title>
    <script>
        // 設定你的網址清單
        const urls = [
            "https://forms.gle/L2HCAmq9E13canf28",
            "https://forms.gle/VjWMLYGLzqo4iHdm8",
            "https://forms.gle/8sLeXNtQgTsGsNe59"
        ];

        // 隨機演算法：從 0 到 2 之間選一個數字
        const randomIndex = Math.floor(Math.random() * urls.length);
        
        // 執行跳轉
        window.location.replace(urls[randomIndex]);
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <p>正在隨機為您跳轉至表單，請稍候...</p>
